<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; background:#111; color:white; text-align:center; font-family:Arial;}
canvas { background:#c19a6b; display:block; margin:auto; }
.controls { margin-top:10px; }
button { font-size:20px; padding:12px; margin:5px; }
</style>
</head>
<body>

<h3>🏀 2K Style Mini Game</h3>
<p>Get space → time your shot → score</p>

<canvas id="game" width="400" height="500"></canvas>

<div class="controls">
  <button onclick="move(-1)">⬅️</button>
  <button onclick="move(1)">➡️</button>
  <button onclick="startShot()">🏀 Shoot</button>
</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let player = {x:200,y:420,speed:3};
let defender = {x:200,y:360};
let ball = {x:200,y:420,vy:0,active:false};

let keys = {};
let shotMeter = 0;
let shooting = false;
let score = 0;
let time = 60;

// keyboard
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

// movement
function move(dir){
  player.x += dir*15;
}

// smooth movement
function updatePlayer(){
  if(keys["ArrowLeft"]) player.x -= player.speed;
  if(keys["ArrowRight"]) player.x += player.speed;

  player.x = Math.max(20, Math.min(380, player.x));
}

// start shot
function startShot(){
  if(!shooting){
    shooting = true;
    shotMeter = 0;
  }
}

// release shot
document.addEventListener("click", ()=>{
  if(shooting){
    let distance = Math.abs(player.x - defender.x);
    let contested = distance < 40;

    let green = (shotMeter > 45 && shotMeter < 55);

    let successChance = green ? 0.9 : 0.4;
    if(contested) successChance -= 0.3;

    shootBall(Math.random() < successChance);
    shooting = false;
  }
});

function shootBall(success){
  ball.x = player.x;
  ball.y = player.y;
  ball.vy = success ? -11 : -7;
  ball.active = true;
}

// defender AI
function updateDefender(){
  let dx = player.x - defender.x;
  defender.x += dx * 0.05; // smooth tracking
}

// shot meter
function updateShotMeter(){
  if(shooting){
    shotMeter += 3;
    if(shotMeter > 100) shotMeter = 0;
  }
}

// ball physics
function updateBall(){
  if(ball.active){
    ball.y += ball.vy;
    ball.vy += 0.35;

    // hoop
    if(ball.y < 120 && ball.x > 160 && ball.x < 240){
      score += 2;
      ball.active = false;
    }

    if(ball.y > 500) ball.active = false;
  } else {
    // dribble effect
    ball.x = player.x;
    ball.y = player.y - 20 + Math.sin(Date.now()/100)*5;
  }
}

// draw
function draw(){
  ctx.clearRect(0,0,400,500);

  // hoop
  ctx.fillStyle="red";
  ctx.fillRect(160,120,80,10);

  // player
  ctx.fillStyle="blue";
  ctx.beginPath();
  ctx.arc(player.x,player.y,15,0,Math.PI*2);
  ctx.fill();

  // defender
  ctx.fillStyle="green";
  ctx.beginPath();
  ctx.arc(defender.x,defender.y,15,0,Math.PI*2);
  ctx.fill();

  // ball
  ctx.fillStyle="orange";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();

  // shot meter bar
  if(shooting){
    ctx.fillStyle="white";
    ctx.fillRect(150,460,100,10);

    ctx.fillStyle="lime";
    ctx.fillRect(150 + shotMeter,460,10,10);
  }

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Score: "+score,10,20);
  ctx.fillText("Time: "+time,300,20);
}

// loop
function loop(){
  updatePlayer();
  updateDefender();
  updateShotMeter();
  updateBall();
  draw();
  requestAnimationFrame(loop);
}

// timer
setInterval(()=>{
  if(time>0) time--;
},1000);

loop();
</script>

</body>
</html>
